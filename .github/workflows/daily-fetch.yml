name: 每日数据抓取

on:
  schedule:
    # 北京时间每天凌晨 2:05 (UTC+8 = 前一天 18:05 UTC)
    - cron: '5 18 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送数据文件

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 抓取七鱼数据
        env:
          QIYU_APP_KEY: ${{ secrets.QIYU_APP_KEY }}
          QIYU_APP_SECRET: ${{ secrets.QIYU_APP_SECRET }}
          QIYU_BASE_URL: ${{ secrets.QIYU_BASE_URL }}
        run: python scripts/fetch_data.py

      - name: 提交并推送数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "没有新数据，跳过提交"
          else
            git commit -m "📊 自动抓取 $(TZ='Asia/Shanghai' date +'%Y-%m-%d') 数据"
            git push
          fi
          echo "✅ 数据已推送，Cloudflare Pages 将自动检测变更并重新部署"
