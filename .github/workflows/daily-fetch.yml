name: 七鱼数据自动抓取

on:
  schedule:
    # 每小时的第 5 分钟运行（UTC 时间，对应北京时间 +8）
    # 例如 UTC 0:05 = 北京 8:05, UTC 16:05 = 北京 0:05 (凌晨)
    - cron: '5 * * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install requests

      - name: 运行数据抓取脚本
        env:
          QIYU_APP_KEY: ${{ secrets.QIYU_APP_KEY }}
          QIYU_APP_SECRET: ${{ secrets.QIYU_APP_SECRET }}
          QIYU_BASE_URL: ${{ secrets.QIYU_BASE_URL }}
        run: python scripts/fetch_data.py

      - name: 提交并推送数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "没有新数据，跳过提交"
          else
            git commit -m "📊 自动抓取 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M') 数据"
            git push
          fi
