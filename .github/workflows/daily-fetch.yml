name: 每日会话导出缓存

on:
  schedule:
    # 每日凌晨 2:00 运行（UTC 18:00，对应北京时间 2:00）
    - cron: '0 18 * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write

jobs:
  export-sessions:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行会话导出脚本
        env:
          QIYU_APP_KEY: ${{ secrets.QIYU_APP_KEY }}
          QIYU_APP_SECRET: ${{ secrets.QIYU_APP_SECRET }}
          QIYU_BASE_URL: ${{ secrets.QIYU_BASE_URL }}
        run: python scripts/export_sessions.py

      - name: 提交并推送数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "没有新数据，跳过提交"
          else
            git commit -m "📊 会话数据缓存 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
            git push
          fi
